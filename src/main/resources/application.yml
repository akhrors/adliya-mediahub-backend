spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: adliya-mediahub

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB

app:
  jwt:
    secret: ${JWT_SECRET:adliya-mediahub-secret-key-2026-very-long-secure}
    expiration: 86400000
    refresh-expiration: 604800000

  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads}
    max-size: 104857600

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    bot-username: ${TELEGRAM_BOT_USERNAME:AdliyaMediaHubBot}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
